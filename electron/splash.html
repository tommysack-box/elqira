<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elqira</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f7f9fb;
        overflow: hidden;
      }

      .app-spinner {
        width: 2.75rem;
        height: 2.75rem;
        border: 3px solid rgba(199, 196, 215, 0.5);
        border-top-color: #2a14b4;
        border-radius: 999px;
        animation: app-spinner-rotate 700ms linear infinite;
      }

      @keyframes app-spinner-rotate {
        from {
          transform: rotate(0deg);
        }

        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="app-spinner" role="status" aria-label="Loading application"></div>
  </body>
</html>
